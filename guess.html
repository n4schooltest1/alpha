<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<title>Change Background with a button</title>


<style>

    body{
        height: 100vh;
        background: white;

    }

    .change_button_light {
        background: white;
        padding: 20px;
        border-radius: 12px;
    }

    .change_button_dark {
        background: linear-gradient(
            135deg,
            rgba(0, 0, 0, 0.195),
            rgba(0, 0, 255, 0.058)
        );
        padding: 20px;
        border-radius: 12px;
    }



</style>


</head>


<body>
    
    <h2>BACKGROUND COLOUR CHANGER</h2>

    <button class="change_button_light" onclick="Change_bg()">Change background</button>



</body>



<script>

    function Change_bg() {

        if (document.body.style.background === "black") {
            document.body.style.background = "white";
        } else {
            document.body.style.background = "black";
        }

    }

</script>



</html>
